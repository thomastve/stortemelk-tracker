name: Stortemelk availability check

on:
  workflow_dispatch:
    # Triggered every 15 min by cron-job.org (more punctual than GitHub's
    # built-in schedule, which delays runs 30-90 min during peak load).
    # Also lets you trigger a manual run from the GitHub Actions tab.

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      # Cache the Playwright browser binary so we don't re-download 180 MB every run
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('stortemelk_monitor.py') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright browser
        run: uv run stortemelk_monitor.py --install-browser

      - name: Check availability and notify if open
        run: uv run stortemelk_monitor.py --once
        env:
          # Set these secrets in: GitHub repo → Settings → Secrets → Actions → New secret
          # NTFY_TOPIC: your-unique-topic-name
          # EMAIL_TO:   recipient email (optional; ntfy forwards the alert if set)
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          EMAIL_TO:   ${{ secrets.EMAIL_TO }}
